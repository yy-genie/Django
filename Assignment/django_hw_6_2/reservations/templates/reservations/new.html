<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 생성</title>
</head>
<body>
    <h1>예약 생성 페이지</h1>
    <form action="{% url 'reservations:create' %}" method="POST">
        {% csrf_token %}
        <div>
            <label for="id_name">Name :</label>
            {{ form.name }}
        </div>
        <div>
            <label for="id_date">Date :</label>
            {{ form.date }}
        </div>
        <button type="submit">예약 생성</button>
    </form>
</body>
</html>
