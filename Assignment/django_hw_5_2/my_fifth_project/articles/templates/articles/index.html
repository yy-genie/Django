<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 페이지</title>
</head>
<body>
    <h1>메인 페이지</h1>
    <a href="{% url 'articles:new' %}">[CREATE]</a>
    
    {% if articles %}
        <ul>
            {% for article in articles %}
                <li>
                    {{ forloop.counter }}번째 글
                    <br>
                    제목 : {{ article.title }}
                    <hr>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>게시글이 없습니다.</p>
    {% endif %}
</body>
</html>
